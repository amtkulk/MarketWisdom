name: Deploy to AWS App Runner

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: market-wisdom-app
  APP_RUNNER_SERVICE_NAME: market-wisdom-service
  ROLE_NAME: AppRunnerECRAccessRole_MW

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or Check IAM Role for App Runner
        run: |
          if ! aws iam get-role --role-name ${{ env.ROLE_NAME }} 2>/dev/null; then
            echo "Creating IAM Role for App Runner to access ECR..."
            cat <<EOF > trust-policy.json
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": { "Service": "build.apprunner.amazonaws.com" },
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          EOF
            aws iam create-role --role-name ${{ env.ROLE_NAME }} --assume-role-policy-document file://trust-policy.json
            aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
            sleep 15 # Wait for role to propagate
          else
            echo "App Runner IAM Role already exists."
          fi
          
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${{ env.ROLE_NAME }}" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }} --all-tags
          echo "IMAGE=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to AWS App Runner
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ${{ env.APP_RUNNER_SERVICE_NAME }}
          image: ${{ env.IMAGE }}
          access-role-arn: ${{ env.ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          cpu: 1
          memory: 2
          port: 5000
