<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Research Hub</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

    <nav>
        <span class="logo"><img src="logo.jpg" alt="Market Wisdom Logo" style="height: 32px; vertical-align: middle; margin-right: 8px;"> Market Wisdom</span>
        <a href="#home" class="nav-btn active" data-target="home">🏠 Home</a>
        <a href="#global" class="nav-btn" data-target="global">🌍 Global Market</a>
        <a href="#war-news" class="nav-btn" data-target="war-news">📰 War News</a>
        <a href="#telegram" class="nav-btn" data-target="telegram">💬 Telegram Feed</a>
        <a href="#screener" class="nav-btn" data-target="screener">📊 Stock Screener</a>
        <a href="#stock" class="nav-btn" data-target="stock">🔍 Stock Research</a>
        <a href="#action" class="nav-btn" data-target="action">⚡ Stock Action</a>
        <a href="#chartink" class="nav-btn" data-target="chartink">📋 Chartink Comparator</a>
        <a href="#nifty" class="nav-btn" data-target="nifty">📈 Nifty Analysis</a>
        <a href="#watchlist" class="nav-btn" data-target="watchlist">⭐ Watchlist</a>
    </nav>

    <div class="page" id="app-container">
        <!-- Views injected here by app.js -->
    </div>

    <!-- Scripts -->
    <script src="api.js?v=4"></script>
    <script src="components.js?v=4"></script>
    <script src="app.js?v=4"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
</body>
</html>
